<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" width="520" height="100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@900&amp;display=swap');
      .wordmark { font-family: 'Figtree', 'Arial Black', sans-serif; font-size: 52px; font-weight: 900; fill: #ffffff; letter-spacing: -1px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="520" height="100" fill="#0e0e10"/>

  <!-- Icon: 3 barres décroissantes -->
  <rect x="20" y="57" width="13" height="29" rx="2" fill="#ffffff"/>
  <rect x="40" y="36" width="13" height="50" rx="2" fill="#ffffff"/>
  <rect x="60" y="14" width="13" height="72" rx="2" fill="#ffffff"/>

  <!-- Wordmark -->
  <text x="90" y="78" class="wordmark">SimplifyPro</text>
</svg>
