<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" width="520" height="100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@900&amp;display=swap');
      .wordmark { font-family: 'Figtree', 'Arial Black', sans-serif; font-size: 52px; font-weight: 900; fill: #ffffff; letter-spacing: -1px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="520" height="100" fill="#0e0e10"/>

  <!-- Icon: Hexagon + S -->
  <g transform="translate(10, 4) scale(0.92)">
    <!-- Hexagon outline -->
    <path
      d="M 50 6 L 88 27 L 88 73 L 50 94 L 12 73 L 12 27 Z"
      stroke="#ffffff"
      stroke-width="5"
      fill="none"
    />
    <!-- Geometric S -->
    <path
      d="M 35 28 L 65 28 L 65 38 L 45 38 L 45 46 L 65 46 L 65 72 L 35 72 L 35 62 L 55 62 L 55 54 L 35 54 Z"
      fill="#ffffff"
    />
  </g>

  <!-- Wordmark -->
  <text x="110" y="78" class="wordmark">SimplifyPro</text>
</svg>
